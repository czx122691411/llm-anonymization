# 异构对抗匿名化：不同模型组合
# 防御者：qwen-plus (性价比)
# 攻击者：deepseek-reasoner (强推理)
# 评估者：qwen-max (高准确度)

output_dir: "results"
seed: 42
task: "ANONYMIZED"
dryrun: False
save_prompts: True
timeout: 0.0
max_workers: 2

task_config:
    profile_path: "data/base_inferences/synthetic/inference_0.jsonl"
    outpath: "results/heterogeneous/synthetic_qwen_deepseek"
    offset: 0
    num_profiles: 10

    # 异构对抗匿名化
    anonymizer:
      anon_type: "adversarial_llm"
      target_mode: "single"
      max_workers: 2
      prompt_level: 3
      replacement_type: "generalize"

    # 防御者：qwen-plus
    anon_model:
      name: "qwen-plus"
      provider: "qwen"
      args: {
        temperature: 0.1,
        max_tokens: 2000,
      }

    # 攻击者：deepseek-reasoner (强推理能力)
    attack_model:
      name: "deepseek-reasoner"
      provider: "deepseek"
      args: {
        temperature: 0.2,
        max_tokens: 2000,
      }

    # 评估者：qwen-max (最强能力)
    evaluator_model:
      name: "qwen-max"
      provider: "qwen"
      args: {
        temperature: 0.0,
        max_tokens: 2000,
      }

    utility_model:
      name: "qwen-max"
      provider: "qwen"
      args: {
        temperature: 0.0,
        max_tokens: 2000,
      }

    # 对抗循环
    max_rounds: 3
    stop_threshold:
      privacy: 0.9
      utility: 0.7
    min_utility_threshold: 0.3

    run_eval_inference: true
    eval_inference_model:
      name: "qwen-max"
      provider: "qwen"
      args: {
        temperature: 0.1,
        max_tokens: 2000,
      }

    run_utility_scoring: true

    profile_filter:
      hardness: 1
      certainty: 1
      num_tokens: 1000

gen_model:
  name: "qwen-plus"
  provider: "qwen"
  args: {
    temperature: 0.1,
  }
