# 高级对抗：多轮次+强化提示
# 使用更多轮次和更强的提示策略

output_dir: "results"
seed: 42
task: "ANONYMIZED"
dryrun: False
save_prompts: True
timeout: 0.0
max_workers: 2

task_config:
    profile_path: "data/base_inferences/synthetic/inference_0.jsonl"
    outpath: "results/advanced/synthetic_multi_round"
    offset: 0
    num_profiles: 10

    # 高级对抗匿名化
    anonymizer:
      anon_type: "adversarial_llm"
      target_mode: "single"
      max_workers: 2
      prompt_level: 5  # 最高级别提示
      replacement_type: "paraphrase"  # 改写而非替换

    # 防御者：qwen-max (最强能力)
    anon_model:
      name: "qwen-max"
      provider: "qwen"
      args: {
        temperature: 0.1,
        max_tokens: 2000,
      }

    # 攻击者：deepseek-reasoner
    attack_model:
      name: "deepseek-reasoner"
      provider: "deepseek"
      args: {
        temperature: 0.3,  # 更高温度以探索更多攻击方式
        max_tokens: 2000,
      }

    # 评估者：qwen-max
    evaluator_model:
      name: "qwen-max"
      provider: "qwen"
      args: {
        temperature: 0.0,
        max_tokens: 2000,
      }

    utility_model:
      name: "qwen-max"
      provider: "qwen"
      args: {
        temperature: 0.0,
        max_tokens: 2000,
      }

    # 更多轮次
    max_rounds: 5
    stop_threshold:
      privacy: 0.95  # 更高隐私要求
      utility: 0.75   # 更高效用要求
    min_utility_threshold: 0.4

    run_eval_inference: true
    eval_inference_model:
      name: "deepseek-reasoner"
      provider: "deepseek"
      args: {
        temperature: 0.1,
        max_tokens: 2000,
      }

    run_utility_scoring: true

    profile_filter:
      hardness: 1
      certainty: 1
      num_tokens: 1000

gen_model:
  name: "qwen-max"
  provider: "qwen"
  args: {
    temperature: 0.1,
  }
